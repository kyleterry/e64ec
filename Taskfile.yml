version: '3'

tasks:
  default:
    desc: Generate site and start server
    cmds:
      - task: generate
      - task: serve

  templ:
    desc: Generate Go code from Templ files
    sources:
      - '**/*.templ'
    generates:
      - '**/*_templ.go'
    cmds:
      - go tool templ generate

  generate:
    desc: Build the static site from content/
    deps: [templ]
    sources:
      - 'content/**/*'
      - 'assets/**/*'
      - 'internal/**/*'
      - 'cmd/e64ec-generate/**/*'
    generates:
      - 'site/public/**/*'
    cmds:
      - go run ./cmd/e64ec-generate

  check:
    desc: Vet, lint, and format all Go sources
    cmds:
      - go vet ./...
      - go tool golangci-lint run ./...
      - find . -name "*.go" ! -name "*_templ.go" -exec go tool goimports -w {} +

  check:dirty:
    desc: Fail if working tree is dirty (excluding site/public)
    cmds:
      - |
        dirty=$(git diff --name-only | grep -v '^site/public' || true)
        untracked=$(git ls-files --others --exclude-standard | grep -v '^site/public' || true)
        if [ -n "$dirty" ] || [ -n "$untracked" ]; then
          echo "Working tree dirty after generate/fmt:"
          echo "$dirty"
          echo "$untracked"
          exit 1
        fi

  build:server:
    desc: Build the e64ec-server binary
    sources:
      - 'site/public/**/*'
      - 'cmd/e64ec-server/**/*'
    generates:
      - 'e64ec-server'
    cmds:
      - go build -o e64ec-server ./cmd/e64ec-server

  build:generate:
    desc: Build the e64ec-generate binary
    deps: [templ]
    cmds:
      - go build -o e64ec-generate ./cmd/e64ec-generate

  build:
    desc: Build all binaries
    deps: [build:generate, build:server]

  serve:
    desc: Run the e64ec-server
    deps: [build:server]
    cmds:
      - ./e64ec-server

  dev:
    desc: Run the server with live reloading
    cmds:
      - air

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f e64ec-server e64ec-generate
      - rm -rf site/public/*
